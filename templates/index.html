<!DOCTYPE html>
<html class="dark" lang="ru">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TikZ Converter</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Manrope:wght@600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "surface-container-highest": "#333533",
                    "on-tertiary-container": "#0f3a27",
                    "on-surface": "#e2e3df",
                    "tertiary-fixed-dim": "#a4d1b6",
                    "surface-variant": "#333533",
                    "tertiary-fixed": "#bfedd1",
                    "surface-container": "#1e201e",
                    "outline": "#8c9389",
                    "surface": "#121412",
                    "surface-bright": "#383a37",
                    "on-error": "#690005",
                    "outline-variant": "#424941",
                    "on-tertiary": "#0c3825",
                    "secondary-fixed": "#d3e8d0",
                    "on-primary-container": "#153b1c",
                    "on-secondary-container": "#acc1aa",
                    "primary-fixed": "#c2eec0",
                    "tertiary": "#a4d1b6",
                    "surface-container-high": "#282a28",
                    "secondary-container": "#3d503e",
                    "tertiary-container": "#7aa58c",
                    "primary": "#a7d1a5",
                    "on-secondary-fixed-variant": "#394b39",
                    "inverse-on-surface": "#2f312f",
                    "surface-tint": "#a7d1a5",
                    "surface-container-low": "#1a1c1a",
                    "error": "#ffb4ab",
                    "surface-dim": "#121412",
                    "primary-fixed-dim": "#a7d1a5",
                    "on-surface-variant": "#c2c8be",
                    "secondary": "#b7ccb5",
                    "on-secondary-fixed": "#0e1f10",
                    "surface-container-lowest": "#0d0f0d",
                    "on-secondary": "#233524",
                    "inverse-primary": "#416743",
                    "on-primary": "#123819",
                    "error-container": "#93000a",
                    "on-tertiary-fixed": "#002113",
                    "on-primary-fixed-variant": "#294f2d",
                    "on-primary-fixed": "#002107",
                    "secondary-fixed-dim": "#b7ccb5",
                    "background": "#121412",
                    "on-background": "#e2e3df",
                    "inverse-surface": "#e2e3df",
                    "primary-container": "#7da67d",
                    "on-tertiary-fixed-variant": "#254f3a",
                    "on-error-container": "#ffdad6"
                },
                "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
                },
                "spacing": {
                    "xl": "64px",
                    "xs": "4px",
                    "base": "8px",
                    "gutter": "24px",
                    "lg": "40px",
                    "md": "24px",
                    "sm": "12px",
                    "margin": "32px"
                },
                "fontFamily": {
                    "body-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "h1": ["Manrope"],
                    "h3": ["Manrope"],
                    "label-sm": ["Inter"],
                    "h2": ["Manrope"]
                },
                "fontSize": {
                    "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                    "h1": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "h3": ["24px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600"}],
                    "label-sm": ["13px", {"lineHeight": "1.0", "letterSpacing": "0.04em", "fontWeight": "500"}],
                    "h2": ["32px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                }
            }
        }
    }
</script>
<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .hidden { display: none !important; }
    .no-scrollbar::-webkit-scrollbar { display: none; }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    .spinner {
        border: 3px solid #333533;
        border-top: 3px solid #a7d1a5;
        border-radius: 50%;
        width: 28px;
        height: 28px;
        animation: spin 1s linear infinite;
    }

    #latexOutput {
        width: 100%;
        min-height: 320px;
        background: #121412;
        color: #a4d1b6;
        font-family: 'Courier New', Courier, monospace;
        font-size: 14px;
        line-height: 1.6;
        padding: 16px;
        border: none;
        outline: none;
        resize: vertical;
        box-sizing: border-box;
        text-shadow: 0 0 8px rgba(167, 209, 165, 0.2);
    }

    .dragover { border-color: #a7d1a5 !important; background: rgba(167,209,165,0.05) !important; }
</style>
</head>
<body class="bg-surface font-body-md text-on-surface antialiased selection:bg-primary/30">

<header class="pt-8 px-8 max-w-[1600px] mx-auto">
    <div class="text-lg font-bold tracking-widest text-[#7DA67D] uppercase font-manrope">
        TikZ Converter
    </div>
</header>

<main class="pt-8 pb-20 px-8 min-h-screen max-w-[1600px] mx-auto">
<div class="grid grid-cols-1 lg:grid-cols-2 gap-gutter items-start">

    <!-- Left Column: Input -->
    <section class="flex flex-col gap-md">
        <div class="flex items-center gap-sm mb-2">
            <span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">upload_file</span>
            <h2 class="font-h3 text-h3 text-on-surface">Input</h2>
        </div>

        <!-- Upload Area -->
        <div id="uploadArea" class="bg-surface-container-low border-2 border-dashed border-outline-variant rounded-xl p-lg flex flex-col items-center justify-center gap-md group hover:border-primary/50 transition-all cursor-pointer min-h-[260px]">
            <input type="file" id="imageInput" accept="image/*" hidden>
            <div class="w-16 h-16 rounded-full bg-secondary-container flex items-center justify-center text-primary group-hover:scale-110 transition-transform duration-300">
                <span class="material-symbols-outlined text-3xl">add_photo_alternate</span>
            </div>
            <div class="text-center">
                <p class="font-body-lg text-body-lg text-on-surface mb-xs">Нажмите или перетащите изображение</p>
                <p class="font-label-sm text-label-sm text-on-surface-variant">PNG, JPG, JPEG | Ctrl+V для вставки</p>
            </div>
            <p id="fileNameDisplay" class="font-label-sm text-primary font-bold mt-1"></p>
        </div>

        <!-- Image Preview -->
        <div id="previewBox" class="hidden bg-surface-container-low rounded-xl p-md border border-outline-variant/30">
            <img id="previewImage" alt="Preview" class="max-w-full max-h-[250px] rounded-lg mx-auto">
        </div>

        <!-- Instructions -->
        <div class="flex flex-col gap-xs">
            <label class="font-label-sm text-label-sm text-on-surface-variant px-1">Пожелания (опционально)</label>
            <textarea id="instructionsInput" class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg p-sm font-body-md text-body-md text-on-surface focus:ring-1 focus:ring-primary focus:border-primary outline-none min-h-[120px] transition-all resize-none placeholder:text-on-surface-variant/30" placeholder="Напр.: сделай линии толще, используй библиотеку arrows.meta, добавь подписи на русском..."></textarea>
        </div>

        <!-- Convert Button -->
        <button id="convertBtn" class="hidden w-full bg-primary-container hover:bg-primary-container/90 text-on-primary-container font-h3 text-h3 py-md rounded-xl transition-all active:scale-[0.98] flex items-center justify-center gap-sm shadow-lg shadow-primary/10">
            <span class="material-symbols-outlined">auto_fix_high</span>
            Конвертировать в TikZ
        </button>
    </section>

    <!-- Right Column: Output -->
    <section class="flex flex-col gap-md">
        <div class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-sm">
                <span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">code</span>
                <h2 class="font-h3 text-h3 text-on-surface">Output</h2>
            </div>
            <div id="statusIndicator" class="flex items-center gap-2">
                <span id="statusDot" class="w-2 h-2 rounded-full bg-outline"></span>
                <span id="statusLabel" class="font-label-sm text-label-sm text-on-surface-variant">Ready</span>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="hidden flex flex-col items-center gap-sm py-lg">
            <div class="spinner"></div>
            <p id="loadingText" class="text-primary font-bold text-sm">Генерация TikZ кода...</p>
            <p id="streamStatus" class="text-on-surface-variant text-xs"></p>
        </div>

        <!-- Output Editor -->
        <div id="result" class="hidden flex flex-col">
            <div class="flex-grow bg-surface-container-highest rounded-xl border border-outline-variant/30 overflow-hidden flex flex-col shadow-xl">
                <!-- Editor Header -->
                <div class="bg-surface-container-high px-md py-sm border-b border-outline-variant/20 flex items-center justify-between">
                    <span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">tikz_code.tex</span>
                    <div class="flex gap-1">
                        <div class="w-2.5 h-2.5 rounded-full bg-red-900/50"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-amber-900/50"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-green-900/50"></div>
                    </div>
                </div>
                <!-- Editor Content -->
                <textarea id="latexOutput"></textarea>
            </div>

            <!-- Action Buttons -->
            <div class="grid grid-cols-3 gap-sm mt-md">
                <button id="copyBtn" class="bg-surface-container-high hover:bg-surface-container-highest text-on-surface font-label-sm py-sm rounded-lg border border-outline-variant/30 flex items-center justify-center gap-2 transition-all active:scale-95">
                    <span class="material-symbols-outlined text-sm">content_copy</span>
                    Копировать
                </button>
                <button id="refineBtn" class="bg-surface-container-high hover:bg-surface-container-highest text-on-surface font-label-sm py-sm rounded-lg border border-outline-variant/30 flex items-center justify-center gap-2 transition-all active:scale-95">
                    <span class="material-symbols-outlined text-sm">build</span>
                    Исправить код
                </button>
                <button id="overleafBtn" class="bg-secondary-container hover:bg-secondary-container/80 text-on-secondary-container font-label-sm py-sm rounded-lg flex items-center justify-center gap-2 transition-all active:scale-95">
                    <span class="material-symbols-outlined text-sm">cloud_upload</span>
                    Overleaf
                </button>
            </div>
        </div>
    </section>

</div>
</main>

<footer class="fixed bottom-0 left-0 w-full flex justify-between items-center px-8 py-3 bg-[#1A1C1A]/80 backdrop-blur-md border-t border-zinc-800/30">
    <p class="font-manrope text-xs tracking-wide text-[#4A4C4A]">&copy; 2024 TikZ Converter. Built for Precision.</p>
    <div class="flex items-center gap-gutter">
        <a class="font-manrope text-xs tracking-wide text-zinc-600 hover:text-zinc-400 transition-colors" href="#">Privacy</a>
        <a class="font-manrope text-xs tracking-wide text-zinc-600 hover:text-zinc-400 transition-colors" href="#">Terms</a>
        <a class="font-manrope text-xs tracking-wide text-zinc-600 hover:text-zinc-400 transition-colors" href="#">API</a>
    </div>
</footer>

<script>
    const uploadArea = document.getElementById('uploadArea');
    const imageInput = document.getElementById('imageInput');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const previewBox = document.getElementById('previewBox');
    const previewImage = document.getElementById('previewImage');
    const convertBtn = document.getElementById('convertBtn');
    const loading = document.getElementById('loading');
    const loadingText = document.getElementById('loadingText');
    const streamStatus = document.getElementById('streamStatus');
    const resultBox = document.getElementById('result');
    const latexOutput = document.getElementById('latexOutput');
    const copyBtn = document.getElementById('copyBtn');
    const overleafBtn = document.getElementById('overleafBtn');
    const refineBtn = document.getElementById('refineBtn');
    const instructionsInput = document.getElementById('instructionsInput');
    const statusDot = document.getElementById('statusDot');
    const statusLabel = document.getElementById('statusLabel');

    function setStatus(state, text) {
        statusLabel.textContent = text || state;
        statusDot.className = 'w-2 h-2 rounded-full';
        if (state === 'ready') statusDot.classList.add('bg-outline');
        else if (state === 'generating') { statusDot.classList.add('bg-primary', 'animate-pulse'); }
        else if (state === 'done') statusDot.classList.add('bg-primary');
    }

    uploadArea.addEventListener('click', () => imageInput.click());

    imageInput.addEventListener('change', function() {
        handleFile(this.files[0]);
    });

    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        handleFile(e.dataTransfer.files[0]);
    });

    document.addEventListener('paste', (e) => {
        const items = e.clipboardData.items;
        for (let i = 0; i < items.length; i++) {
            if (items[i].type.indexOf('image') !== -1) {
                handleFile(items[i].getAsFile());
                break;
            }
        }
    });

    function handleFile(file) {
        if (!file || !file.type.startsWith('image/')) {
            alert('Пожалуйста, выберите изображение.');
            return;
        }

        fileNameDisplay.textContent = file.name;

        const reader = new FileReader();
        reader.onload = function(e) {
            previewImage.src = e.target.result;
            previewBox.classList.remove('hidden');
            convertBtn.classList.remove('hidden');
            resultBox.classList.add('hidden');
            setStatus('ready', 'Ready');
        }
        reader.readAsDataURL(file);
    }

    // Конвертация со стримингом
    convertBtn.addEventListener('click', async () => {
        const file = imageInput.files[0] || (previewImage.src && previewImage.src.startsWith('data:') ? dataURLtoFile(previewImage.src, 'pasted_image.png') : null);

        if (!file) {
            alert("Файл не выбран!");
            return;
        }

        const formData = new FormData();
        formData.append('image', file);
        if (instructionsInput.value.trim()) {
            formData.append('instructions', instructionsInput.value.trim());
        }

        loading.classList.remove('hidden');
        convertBtn.classList.add('hidden');
        resultBox.classList.add('hidden');
        streamStatus.textContent = '';
        loadingText.textContent = 'Генерация TikZ кода...';
        latexOutput.value = '';
        setStatus('generating', 'Generating...');

        try {
            const response = await fetch('/convert', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.error || `Ошибка: ${response.status}`);
            }

            await handleSSEStream(response);

        } catch (e) {
            console.error("Error:", e);
            alert("Ошибка: " + e.message);
            loading.classList.add('hidden');
            convertBtn.classList.remove('hidden');
            setStatus('ready', 'Error');
        }
    });

    copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(latexOutput.value).then(() => {
            const icon = copyBtn.querySelector('.material-symbols-outlined');
            icon.textContent = 'check';
            setTimeout(() => { icon.textContent = 'content_copy'; }, 2000);
        });
    });

    // Общая функция для чтения SSE-стрима
    async function handleSSEStream(response) {
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        resultBox.classList.remove('hidden');

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const jsonStr = line.slice(6);
                if (!jsonStr) continue;

                try {
                    const data = JSON.parse(jsonStr);

                    if (data.chunk) {
                        latexOutput.value += data.chunk;
                        latexOutput.scrollTop = latexOutput.scrollHeight;
                        loadingText.textContent = 'Генерация...';
                    }

                    if (data.status) {
                        streamStatus.textContent = data.status;
                    }

                    if (data.done) {
                        latexOutput.value = data.latex;
                        loading.classList.add('hidden');
                        convertBtn.classList.remove('hidden');
                        refineBtn.disabled = false;
                        setStatus('done', 'Done');
                        return;
                    }

                    if (data.error) {
                        throw new Error(data.error);
                    }
                } catch (parseErr) {
                    if (parseErr.message !== jsonStr) throw parseErr;
                }
            }
        }

        loading.classList.add('hidden');
        convertBtn.classList.remove('hidden');
        refineBtn.disabled = false;
        setStatus('done', 'Done');
    }

    // Исправить код
    refineBtn.addEventListener('click', async () => {
        const code = latexOutput.value.trim();
        const instructions = instructionsInput.value.trim();

        if (!code) {
            alert('Нет кода для исправления');
            return;
        }
        if (!instructions) {
            alert('Напишите пожелания в поле слева');
            return;
        }

        loading.classList.remove('hidden');
        refineBtn.disabled = true;
        convertBtn.classList.add('hidden');
        streamStatus.textContent = '';
        loadingText.textContent = 'Исправляю код...';
        latexOutput.value = '';
        setStatus('generating', 'Refining...');

        try {
            const response = await fetch('/refine', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code, instructions })
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.error || `Ошибка: ${response.status}`);
            }

            await handleSSEStream(response);

        } catch (e) {
            console.error("Refine error:", e);
            alert("Ошибка: " + e.message);
            loading.classList.add('hidden');
            convertBtn.classList.remove('hidden');
            refineBtn.disabled = false;
            setStatus('ready', 'Error');
        }
    });

    overleafBtn.addEventListener('click', () => {
        const code = latexOutput.value;
        if (!code) return;
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = 'https://www.overleaf.com/docs';
        form.target = '_blank';
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'encoded_snip';
        input.value = encodeURIComponent(code);
        form.appendChild(input);
        const engine = document.createElement('input');
        engine.type = 'hidden';
        engine.name = 'engine';
        engine.value = 'pdflatex';
        form.appendChild(engine);
        document.body.appendChild(form);
        form.submit();
        document.body.removeChild(form);
    });

    function dataURLtoFile(dataurl, filename) {
        var arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
            bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
        while(n--){
            u8arr[n] = bstr.charCodeAt(n);
        }
        return new File([u8arr], filename, {type:mime});
    }
</script>
</body>
</html>
