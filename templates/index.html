<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to LaTeX Converter</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .container {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: #4a4a4a;
            font-size: 2.5em;
        }

        .subtitle {
            color: #777;
            margin-bottom: 30px;
        }

        .upload-area {
            border: 2px dashed #764ba2;
            border-radius: 15px;
            padding: 30px;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-bottom: 20px;
            position: relative;
        }

        .upload-area:hover, .upload-area.dragover {
            background-color: #f3f0ff;
        }

        .upload-content svg {
            color: #764ba2;
            margin-bottom: 10px;
        }

        .file-types {
            font-size: 0.8em;
            color: #999;
            display: block;
            margin-top: 5px;
        }

        .btn {
            background: #764ba2;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s ease;
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.3);
        }

        .btn:hover {
            background: #6f42c1;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .result-box, .preview-box {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
            border: 1px solid #eee;
        }

        textarea {
            width: 100%;
            height: 200px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: vertical;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .hidden { display: none !important; }
        
        .loading {
            margin-top: 20px;
            color: #764ba2;
            font-weight: bold;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #764ba2;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #previewImage {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            margin-top: 10px;
        }

        #streamStatus {
            color: #764ba2;
            font-size: 0.9em;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Image to TikZ Converter</h1>
        <p class="subtitle">Конвертируйте изображения в TikZ код</p>

        <div class="upload-area" id="uploadArea">
            <input type="file" id="imageInput" accept="image/*" hidden>
            <div class="upload-content">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <p>Нажмите или перетащите изображение</p>
                <span class="file-types">PNG, JPG, JPEG | Ctrl+V для вставки</span>
                <p id="fileNameDisplay" style="margin-top:10px; color:#764ba2; font-weight:bold;"></p>
            </div>
        </div>

        <div id="previewBox" class="preview-box hidden">
            <h3>Загруженное изображение:</h3>
            <img id="previewImage" alt="Preview">
        </div>

        <button id="convertBtn" class="btn hidden">Конвертировать в TikZ</button>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p id="loadingText">Генерация TikZ кода...</p>
            <p id="streamStatus"></p>
        </div>

        <div id="result" class="result-box hidden">
            <h3>TikZ код:</h3>
            <textarea id="latexOutput" readonly></textarea>
            <button id="copyBtn" class="btn" style="background:#28a745;">Копировать</button>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const previewBox = document.getElementById('previewBox');
        const previewImage = document.getElementById('previewImage');
        const convertBtn = document.getElementById('convertBtn');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');
        const streamStatus = document.getElementById('streamStatus');
        const resultBox = document.getElementById('result');
        const latexOutput = document.getElementById('latexOutput');
        const copyBtn = document.getElementById('copyBtn');

        uploadArea.addEventListener('click', () => imageInput.click());

        imageInput.addEventListener('change', function() {
            handleFile(this.files[0]);
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        });

        document.addEventListener('paste', (e) => {
            const items = e.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    handleFile(items[i].getAsFile());
                    break;
                }
            }
        });

        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) {
                alert('Пожалуйста, выберите изображение.');
                return;
            }

            fileNameDisplay.textContent = `Выбран файл: ${file.name}`;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                previewImage.src = e.target.result;
                previewBox.classList.remove('hidden');
                convertBtn.classList.remove('hidden');
                resultBox.classList.add('hidden');
            }
            reader.readAsDataURL(file);
        }

        // Конвертация со стримингом
        convertBtn.addEventListener('click', async () => {
            const file = imageInput.files[0] || (previewImage.src.startsWith('data:') ? dataURLtoFile(previewImage.src, 'pasted_image.png') : null);

            if (!file) {
                alert("Файл не выбран!");
                return;
            }

            const formData = new FormData();
            formData.append('image', file);

            loading.classList.remove('hidden');
            convertBtn.classList.add('hidden');
            resultBox.classList.add('hidden');
            streamStatus.textContent = '';
            loadingText.textContent = 'Генерация TikZ кода...';
            latexOutput.value = '';

            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.error || `Ошибка: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                // Показываем результат сразу — код будет появляться по мере стрима
                resultBox.classList.remove('hidden');

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // Оставляем незавершённую строку

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const jsonStr = line.slice(6);
                        if (!jsonStr) continue;

                        try {
                            const data = JSON.parse(jsonStr);

                            if (data.chunk) {
                                // Стриминг — добавляем текст по мере получения
                                latexOutput.value += data.chunk;
                                latexOutput.scrollTop = latexOutput.scrollHeight;
                                loadingText.textContent = 'Генерация...';
                            }

                            if (data.status) {
                                streamStatus.textContent = data.status;
                            }

                            if (data.done) {
                                // Финал — заменяем на очищенный код
                                latexOutput.value = data.latex;
                                loading.classList.add('hidden');
                                convertBtn.classList.remove('hidden');
                                return;
                            }

                            if (data.error) {
                                throw new Error(data.error);
                            }
                        } catch (parseErr) {
                            if (parseErr.message !== jsonStr) throw parseErr;
                        }
                    }
                }

                // Стрим закончился без done-сообщения
                loading.classList.add('hidden');
                convertBtn.classList.remove('hidden');

            } catch (e) {
                console.error("Error:", e);
                alert("Ошибка: " + e.message);
                loading.classList.add('hidden');
                convertBtn.classList.remove('hidden');
            }
        });

        copyBtn.addEventListener('click', () => {
            latexOutput.select();
            document.execCommand('copy');
            copyBtn.textContent = 'Скопировано!';
            copyBtn.style.background = '#218838';
            setTimeout(() => {
                copyBtn.textContent = 'Копировать';
                copyBtn.style.background = '#28a745';
            }, 2000);
        });

        function dataURLtoFile(dataurl, filename) {
            var arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
                bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
            while(n--){
                u8arr[n] = bstr.charCodeAt(n);
            }
            return new File([u8arr], filename, {type:mime});
        }
    </script>
</body>
</html>
