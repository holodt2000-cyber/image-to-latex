<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to LaTeX Converter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <div class="container">
        <h1>Image to TikZ Converter</h1>
        <p class="subtitle">Конвертируйте изображения в TikZ код</p>

        <div class="upload-area" id="uploadArea">
            <input type="file" id="imageInput" accept="image/*" hidden>
            <div class="upload-content">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <p>Нажмите или перетащите изображение</p>
                <span class="file-types">PNG, JPG, JPEG, GIF, BMP • Ctrl+V для вставки</span>
            </div>
        </div>

        <div id="preview" class="preview hidden">
            <h3>Загруженное изображение:</h3>
            <img id="previewImage" alt="Preview">
        </div>

        <button id="convertBtn" class="btn hidden">Конвертировать в TikZ</button>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Обработка изображения...</p>
        </div>
        <div id="debug-panel" style="margin-top: 20px; padding: 15px; background: #f0f4f8; border-left: 5px solid #007bff; border-radius: 4px; display: none;">
    <h4 style="margin-top: 0; color: #007bff;">👁️ Vision Debug: Что увидела нейронка</h4>
    <p id="debug-text" style="font-family: 'Courier New', Courier, monospace; font-size: 14px; white-space: pre-wrap; color: #333;"></p>
</div>

<script>
// В твоей функции fetch('/convert', ...)
async function convert() {
    const debugPanel = document.getElementById('debug-panel');
    const debugText = document.getElementById('debug-text');
    
    // Скрываем старые данные перед новым запросом
    debugPanel.style.display = 'none';

    try {
        const response = await fetch('/convert', { method: 'POST', body: formData });
        const data = await response.json();

        if (data.success) {
            // Показываем плашку и текст
            debugPanel.style.display = 'block';
            debugText.innerText = data.debug_description;
            
            // Твой основной код вывода LaTeX
            document.getElementById('latex-output').value = data.latex;
        } else {
            alert("Ошибка: " + data.error);
        }
    } catch (e) {
        console.error(e);
    }
}
</script>
        <div id="result" class="result hidden">
            <h3>TikZ код:</h3>
            <div class="latex-code">
                <pre><code id="latexOutput"></code></pre>
                <button id="copyBtn" class="copy-btn">Копировать</button>
            </div>
            <div class="latex-preview" id="latexPreview"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
